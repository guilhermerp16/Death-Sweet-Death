<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deadlivery — Entrar</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<p class="proto-nav">Protótipo Deadlivery · Tela 1 de 10 — <a href="index.html">ver mapa de telas</a></p>

<div class="device">
  <div class="statusbar">
    <span>23:13</span>
    <span>●●● 5G 100%</span>
  </div>

  <div class="auth-wrap">
    <div class="auth-logo"><img src="logo.png" alt="Logo Deadlivery: cupcake com caveira"></div>
    <div class="big-word">Deadlivery</div>
    <p class="tagline">Death, Sweet Death 🦇</p>

    <form style="width:100%;" onsubmit="return false;">
      <div class="field">
        <label for="email">E-mail</label>
        <input id="email" type="email" placeholder="seuemail@exemplo.com">
      </div>
      <div class="field">
        <label for="senha">Senha</label>
        <input id="senha" type="password" placeholder="••••••••">
      </div>
      <div style="text-align:right; margin-bottom:18px;">
        <a href="#" style="font-size:12px; color:var(--bone-dim); border-bottom:1px solid var(--bone-dim);">Esqueci minha senha</a>
      </div>

      <a href="home.html" class="btn-primary">Entrar no Caixão 🪦</a>
    </form>

    <div class="auth-divider">ou</div>

    <a href="cadastro.html" class="btn-secondary">Criar conta nova</a>

    <p class="switch-line">Primeira vez por aqui? <a href="cadastro.html">Cadastre-se</a></p>
  </div>

</div>

</body>
</html>
